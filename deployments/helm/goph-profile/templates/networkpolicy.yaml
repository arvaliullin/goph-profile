{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "goph-profile.fullname" . }}
  labels:
    {{- include "goph-profile.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "goph-profile.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.ingressNamespaceSelector | nindent 12 }}
  {{- if .Values.networkPolicy.egress.enabled }}
  egress:
    - to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.egress.ipBlock.cidr }}
      ports:
        {{- range .Values.networkPolicy.egress.ports }}
        - protocol: {{ .protocol | default "TCP" }}
          port: {{ .port }}
        {{- end }}
  {{- end }}
{{- end }}
