{{- if .Values.profiled.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "goph-profile.componentName" (dict "ctx" . "name" "profiled") }}
  labels:
    {{- include "goph-profile.componentLabels" (dict "ctx" . "name" "profiled") | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "goph-profile.componentName" (dict "ctx" . "name" "profiled") }}
  minReplicas: {{ .Values.profiled.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.profiled.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.profiled.autoscaling.cpuUtilization }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.profiled.autoscaling.memoryUtilization }}
{{- end }}
