apiVersion: v1
kind: Service
metadata:
  name: {{ include "goph-profile.componentName" (dict "ctx" . "name" "profiled") }}
  labels:
    {{- include "goph-profile.componentLabels" (dict "ctx" . "name" "profiled") | nindent 4 }}
spec:
  type: {{ .Values.profiled.service.type }}
  selector:
    {{- include "goph-profile.componentSelectorLabels" (dict "ctx" . "name" "profiled") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.profiled.service.port }}
      targetPort: http
      protocol: TCP
    - name: metrics
      port: {{ .Values.profiled.service.targetPort }}
      targetPort: http
      protocol: TCP
