services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: avatars
      POSTGRES_PASSWORD: avatars
      POSTGRES_DB: avatars
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avatars -d avatars"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: l2yvH7UySa6rQar5QYlduQ
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: ..
      dockerfile: build/profiled.Dockerfile
    command: ["./migrate"]
    environment:
      DATABASE_URI: postgres://avatars:avatars@postgres:5432/avatars?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  profiled:
    build:
      context: ..
      dockerfile: build/profiled.Dockerfile
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URI: postgres://avatars:avatars@postgres:5432/avatars?sslmode=disable
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      MINIO_BUCKET: avatars
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_UPLOAD: avatars.upload
      KAFKA_TOPIC_DELETE: avatars.delete
      MAX_UPLOAD_BYTES: "10485760"
      PUBLIC_BASE_URL: ""
      LOG_LEVEL: info
      OTEL_ENVIRONMENT: docker
      OTEL_SERVICE_NAME: profiled
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4318
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 10

  avatard:
    build:
      context: ..
      dockerfile: build/avatard.Dockerfile
    environment:
      DATABASE_URI: postgres://avatars:avatars@postgres:5432/avatars?sslmode=disable
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      MINIO_BUCKET: avatars
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_UPLOAD: avatars.upload
      KAFKA_TOPIC_DELETE: avatars.delete
      KAFKA_GROUP: avatars-worker
      METRICS_ADDR: ":9091"
      LOG_LEVEL: info
      OTEL_ENVIRONMENT: docker
      OTEL_SERVICE_NAME: avatard
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4318
    depends_on:
      profiled:
        condition: service_healthy
      minio:
        condition: service_started
      kafka:
        condition: service_healthy

  http:
    build:
      context: ..
      dockerfile: build/http.Dockerfile
    ports:
      - "8081:80"
    depends_on:
      profiled:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.55.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ../configs/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      profiled:
        condition: service_healthy

  jaeger:
    image: jaegertracing/all-in-one:1.61.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"

  loki:
    image: grafana/loki:3.2.1
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ../configs/observability/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.2.1
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ../configs/observability/promtail/promtail-config.yaml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.2.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../configs/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../configs/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

volumes:
  postgres-data:
  minio-data:
  kafka-data:
