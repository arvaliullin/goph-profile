global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: profiled
    metrics_path: /metrics
    static_configs:
      - targets: ["profiled:8080"]

  - job_name: avatard
    metrics_path: /metrics
    static_configs:
      - targets: ["avatard:9091"]

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
